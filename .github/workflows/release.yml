on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  id-token: write  # required for OIDC
  actions: read
  contents: read
  deployments: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: AlaskaAirlines/auro-actions/.github/actions/build@dev
        with:
          os: ubuntu-latest
          node-version: ${{ matrix.node-version }}
  test:
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: AlaskaAirlines/auro-actions/.github/actions/test@dev
        with:
          os: ubuntu-latest
          node-version: ${{ matrix.node-version }}
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      actions: read
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write  # required for OIDC
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          cache: npm
          node-version: 22
      - name: Restore dist/demo directories to cache
        uses: actions/cache@v4
        id: build_cache
        with:
          path: |
            ./dist
            ./demo
            ./node_modules
            ./custom-elements.json
          key: build-22-${{ github.run_id }}
      - name: Force provenance flag for semantic-release
        run: npm config set provenance true
      - name: NPM install
        run: npm ci
      - run: npm install --global corepack@latest
      - run: corepack npm audit signatures
      - name: Release
        run: npx semantic-release@25.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_NPM_TOKEN }}
