on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false
    inputs:
      cache-dirs:
        description: 'Directories to cache build artifacts'
        required: false
        type: string
        default: |
          ./dist
          ./demo
          ./node_modules
          ./custom-elements.json
      test-matrix:
        description: |
          JSON array of test slices to run as parallel jobs. Each entry: { name, command }.
          Default = a single job running `npm run test` (existing behavior).
        required: false
        type: string
        default: '[{"name":"test","command":"npm run test"}]'
      additional-build-command:
        description: 'Optional command to run after build and before caching (e.g. `npx playwright install chromium`).'
        required: false
        type: string
        default: ''

permissions:
  id-token: write  # required for OIDC
  actions: read
  contents: read
  deployments: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.22.1, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: AlaskaAirlines/auro-actions/.github/actions/build@main
        with:
          os: ubuntu-latest
          node-version: ${{ matrix.node-version }}
          cache-dirs: ${{ inputs.cache-dirs }}
          additional-build-command: ${{ inputs.additional-build-command }}
  test:
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.22.1, 24]
        slice: ${{ fromJSON(inputs.test-matrix) }}
    name: test (${{ matrix.slice.name }}, node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: AlaskaAirlines/auro-actions/.github/actions/test@main
        with:
          os: ubuntu-latest
          node-version: ${{ matrix.node-version }}
          cache-dirs: ${{ inputs.cache-dirs }}
          command: ${{ matrix.slice.command }}
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      actions: read
      deployments: write
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
      - name: Upgrade NPM
        run: npm install -g npm@11.12.1
      - name: Restore dist/demo directories to cache
        uses: actions/cache@v4
        id: build_cache
        with:
          path: ${{ inputs.cache-dirs }}
          key: build-22.22.1-${{ github.run_id }}
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
