on:
  workflow_call:

permissions:
  contents: write
  deployments: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
      - name: Run auro rc-workflow
        run: npx --ignore-scripts --package=@aurodesignsystem/auro-cli -- auro rc-workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger release workflow on RC branch
        run: |
          RC_BRANCH=$(git ls-remote --heads origin 'rc/*' | sort -t'/' -k3 -V | tail -1 | awk '{print $2}' | sed 's|refs/heads/||')
          if [ -n "$RC_BRANCH" ]; then
            echo "Dispatching release workflow for branch: $RC_BRANCH"
            gh workflow run release.yml --ref "$RC_BRANCH"
          else
            echo "No RC branch found to dispatch"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          