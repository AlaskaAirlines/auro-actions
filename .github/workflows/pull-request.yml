on:
  workflow_call:
    secrets:
      AURO_SURGE_TOKEN:
        required: true
    inputs:
      component:
        description: 'Component name for demo deployment'
        required: true
        type: string

permissions:
  id-token: write  # required for OIDC
  contents: read
  deployments: write
  issues: write
  pull-requests: write

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: AlaskaAirlines/auro-actions/.github/actions/build@dev
        with:
          os: ubuntu-latest
          node-version: ${{ matrix.node-version }}
  test:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: AlaskaAirlines/auro-actions/.github/actions/test@dev
        with:
          os: ubuntu-latest
          node-version: ${{ matrix.node-version }}
  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    # Skip on PR close
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Restore dist/demo directories to cache
        uses: actions/cache@v4
        id: build_cache
        with:
          path: |
            ./dist
            ./demo
            ./node_modules
            ./custom-elements.json
          key: build-22-${{ github.run_id }}
      - name: Deploy ${{ inputs.component }} demo
        uses: AlaskaAirlines/auro-actions/.github/actions/surge@dev
        with:
          action: deploy
          component: ${{ inputs.component }}
          pr-number: ${{ github.event.pull_request.number }}
          demo-path: "./demo"
          surge-token: ${{ secrets.AURO_SURGE_TOKEN }}
          github-token: ${{ github.token }}
  teardown:
    runs-on: ubuntu-latest
    # Only run on PR close
    if: github.event.action == 'closed'
    steps:
      - uses: actions/checkout@v4
      - name: Teardown ${{ inputs.component }} from Surge
        uses: AlaskaAirlines/auro-actions/.github/actions/surge@dev
        with:
          action: teardown
          component: ${{ inputs.component }}
          pr-number: ${{ github.event.pull_request.number }}
          demo-path: "./demo"
          surge-token: ${{ secrets.AURO_SURGE_TOKEN }}
          github-token: ${{ github.token }}
