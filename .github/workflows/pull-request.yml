on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false
      AURO_SURGE_TOKEN:
        required: false
    inputs:
      component:
        description: 'Not used currently, kept to prevent existing workflows from breaking.'
        required: false
        default: ''
        type: string
      demo-dir:
        description: 'Directory containing demo to publish to GitHub Pages'
        required: false
        default: './demo'
        type: string
      demo-build-command:
        description: 'Extra command to run specifically to build the demo for pr-preview'
        required: false
        default: ''
        type: string
      cache-dirs:
        description: 'Directories to cache build artifacts'
        required: false
        type: string
        default: |
          ./dist
          ./demo
          ./node_modules
          ./custom-elements.json
      test-matrix:
        description: |
          JSON array of test slices to run as parallel jobs. Each entry: { name, command }.
          Default = a single job running `npm run test` (existing behavior).
        required: false
        type: string
        default: '[{"name":"test","command":"npm run test"}]'
      additional-build-command:
        description: 'Optional command to run after build and before caching (e.g. `npx playwright install chromium`).'
        required: false
        type: string
        default: ''

permissions:
  id-token: write  # required for OIDC
  contents: write
  deployments: write
  issues: write
  pull-requests: write

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.22.1, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: AlaskaAirlines/auro-actions/.github/actions/build@main
        with:
          os: ubuntu-latest
          node-version: ${{ matrix.node-version }}
          cache-dirs: ${{ inputs.cache-dirs }}
          additional-build-command: ${{ inputs.additional-build-command }}
  test:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.22.1, 24]
        slice: ${{ fromJSON(inputs.test-matrix) }}
    name: test (${{ matrix.slice.name }}, node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: AlaskaAirlines/auro-actions/.github/actions/test@main
        with:
          os: ubuntu-latest
          node-version: ${{ matrix.node-version }}
          cache-dirs: ${{ inputs.cache-dirs }}
          command: ${{ matrix.slice.command }}
  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    # Skip on PR close and on release branches
    if: github.event.action != 'closed' && !startsWith(github.ref, 'refs/heads/rc/')
    steps:
        - uses: actions/checkout@v4
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 22.22.1
            registry-url: 'https://registry.npmjs.org'
        - name: Upgrade NPM
          run: npm install -g npm@11.12.1
        - name: Restore dist/demo directories to cache
          uses: actions/cache@v4
          id: build-ubuntu-latest-node-v22
          with:
            path: ${{ inputs.cache-dirs }}
            key: build-22.22.1-${{ github.run_id }}
        - name: Generate PR release version
          run: npx --ignore-scripts --package=@aurodesignsystem/auro-cli -- auro pr-release -p ${{ github.event.pull_request.number }}
        - name: Read package.json
          id: package
          uses: actions/github-script@v7
          with:
            script: |
              const fs = require('fs');
              const packageJson = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
              const prodName = packageJson.name.replace('-dev', '');
              core.setOutput('name', packageJson.name);
              core.setOutput('prodName', prodName);
              core.setOutput('version', packageJson.version);
              return packageJson;
            result-encoding: string
        - name: Publish to NPM
          run: npm publish --tag latest --provenance --ignore-scripts
          env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        - name: Comment on PR
          uses: marocchino/sticky-pull-request-comment@v2
          with:
            header: release
            message: |
              🚀 PR Release Published! `v${{ steps.package.outputs.version }}`

              To install:
              ```bash
              npm install ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}
              ```

              Install via alias:
              ```bash
              npm install ${{ steps.package.outputs.prodName }}@npm:${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}
              ```

              [View on npmjs.com](https://www.npmjs.com/package/${{ steps.package.outputs.name }}/v/${{ steps.package.outputs.version }})
  preview:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
      - name: Restore dist/demo directories to cache
        uses: actions/cache@v4
        id: build_cache
        with:
          path: ${{ inputs.cache-dirs }}
          key: build-22.22.1-${{ github.run_id }}
      - name: Run additional build command
        if: ${{ inputs.demo-build-command != '' }}
        run: ${{ inputs.demo-build-command }}
      - name: Deploy PR preview
        uses: AlaskaAirlines/auro-actions/.github/actions/pr-preview@main
        with:
          source-dir: ${{ inputs.demo-dir }}
          umbrella-dir: 'pr-preview'
          github-token: ${{ secrets.GITHUB_TOKEN }}
  preview-cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
      - name: Delete PR preview
        uses: AlaskaAirlines/auro-actions/.github/actions/pr-preview@main
        with:
          source-dir: ${{ inputs.demo-dir }}
          umbrella-dir: 'pr-preview'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          action: 'remove'
