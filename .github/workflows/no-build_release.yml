on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true

permissions:
  id-token: write  # required for OIDC
  actions: read
  contents: read
  deployments: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: NPM install
        run: npm ci
      - name: Upgrade NPM
        run: npm install -g npm@latest
      - name: Force provenance flag for semantic-release
        run: npm config set provenance true
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx -p node@v24-lts -c "npx semantic-release@25.0.1"
